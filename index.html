<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Patata Caliente de las Tablas</title>
<link rel="icon" type="image/x-icon" href="./resources/favicon.ico">
<style>
body { margin:0; font-family: 'Trebuchet MS'; text-align:center; color:white; }

#start {
  background: url('./resources/decorado_de_fondo.png') center/cover no-repeat;
  position: relative;
  overflow: hidden;
}

#start::before {
  content: "";
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.4);
}

#startContent {
  position: relative;
  z-index: 2;
}

.logo {
  width: 250px;
  margin: 20px auto;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.lights {
  position: absolute;
  top:0;
  width:100%;
  height:100%;
  pointer-events:none;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.1) 0px,
    rgba(255,255,255,0.1) 5px,
    transparent 5px,
    transparent 50px
  );
  animation: lightsMove 5s linear infinite;
}

@keyframes lightsMove {
  from { background-position: 0 0; }
  to { background-position: 200px 0; }
}
.screen { display:none; padding:20px; }
.active { display:block; }
button { padding:15px 25px; margin:10px; font-size:18px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
input { padding:10px; margin:10px; font-size:16px; }

.blue-bg { background:linear-gradient(135deg,#007BFF,#00c6ff); }
.yellow-bg { background:linear-gradient(135deg,#FFD700,#ff9800); }

h1 { font-size:3em; text-shadow:2px 2px 5px black; }
.question { font-size:3em; margin:20px; }

#timerBar { width:80%; height:20px; background:#444; margin:20px auto; border-radius:10px; overflow:hidden; }
#timerFill { height:100%; width:100%; background:red; }

#imageBox img { width:200px; height:150px; margin:10px; border-radius:10px; }

textarea { width:80%; height:100px; margin-top:10px; }

#result{ background:url('./resources/decorado_de_fondo.png') center/cover no-repeat; position:relative; overflow:hidden; } 
#result::before{ content:""; position:absolute; inset:0; background:rgba(0,0,0,.45); } 
#result #startContent{ position:relative; z-index:2; }
  
</style>
</head>
<body>

<div id="start" class="screen active">
<div class="lights"></div>
<div id="startContent">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/616/616490.png">
<h1>🔥 GRAND PRIX DE LAS TABLAS DE MULTIPLICAR 🔥</h1>
<input id="team1" placeholder="Equipo Azul"><br>
<input id="team2" placeholder="Equipo Amarillo"><br>

<h3>Espacio personalizable</h3>
<textarea placeholder="Escribe aquí lo que quieras..."></textarea>

<br>
<button onclick="startGame(60)">⏱ 1 minuto</button>
<button onclick="startGame(300)">⏱ 5 minutos</button>
<button onclick="startGame(600)">⏱ 10 minutos</button>
</div>
</div>

<div id="countdown" class="screen">
  <h1 id="count"></h1>
  <img id="countdownImage" src="" style=" width:350px; border-radius:15px; margin-top:20px; box-shadow:0 0 15px rgba(0,0,0,.5); ">
</div>

<div id="game" class="screen"> 
  <h1 id="turn"></h1> 
  <img id="teamImage" src="" style=" width:250px; margin:15px; border-radius:15px; box-shadow:0 0 15px rgba(0,0,0,.4); "> 
  <div class="question" id="question"></div> 
  <input id="answer" type="number"> 
  <button onclick="checkAnswer()"> Responder </button> 
  <p>Puntos: <span id="score">0</span></p> 
  <h2> 🔥 Racha: <span id="streak">0</span> </h2> 
  <div id="timerBar"> 
    <div id="timerFill"></div> 
  </div> <p> Tiempo: <span id="time"></span> </p> 
</div>

<div id="result" class="screen"> 
  <div class="lights"></div> 
  <div id="startContent"> 
    <h1 id="winnerText"></h1> 
    <div id="statsContainer"></div> 
    <button onclick="location.reload()"> 🔁 Volver a jugar </button> 
  </div> 
</div>

<script>
  let teams = []; 
  let scores = [0,0]; 
  let currentTeam = 0; 
  let totalTurnsPlayed = 0; // CORRECCIÓN: Contador de turnos totales jugados
  let timeLeft = 0; 
  let totalTime; 
  let interval; 
  let correctAnswer; 
  let questionStartTime; 
  let stats = [ { correct:0, wrong:0, totalResponseTime:0, answers:0, bestStreak:0, streak:0 }, { correct:0, wrong:0, totalResponseTime:0, answers:0, bestStreak:0, streak:0 } ];

function startGame(time){
  teams[0] = document.getElementById('team1').value || "Equipo Azul";
  teams[1] = document.getElementById('team2').value || "Equipo Amarillo";
  totalTime = time;
  totalTurnsPlayed = 0;
  scores = [0, 0];
  currentTeam = Math.floor(Math.random()*2); // Selecciona uno al azar para empezar
  nextTurn();
}

function nextTurn(){ 
  // CORRECCIÓN: Si ya jugaron los 2 equipos, mostramos resultados
  if(totalTurnsPlayed >= 2){ 
    return showResults(); 
  } 
  
  showScreen('countdown'); 
  
  if(currentTeam === 0){ 
    document.getElementById('countdownImage').src='./resources/tabla_azul.png'; 
  } else { 
    document.getElementById('countdownImage').src='./resources/tabla_amarilla.png'; 
  } 
  
  let count = 3; 
  document.getElementById('count').innerText = teams[currentTeam]; 
  
  let cd = setInterval(()=>{ 
    count--; 
    if(count > 0){ 
      document.getElementById('count').innerText = teams[currentTeam] + ' en ' + count; 
    } else { 
      clearInterval(cd); 
      startTurn(); 
    } 
  }, 1000); 
}

function startTurn(){ 
  timeLeft = totalTime; 
  document.getElementById('time').innerText = timeLeft; 
  document.getElementById('score').innerText = scores[currentTeam]; 
  document.getElementById('streak').innerText = 0; 
  showScreen('game'); 
  document.getElementById('turn').innerText = 'Turno de ' + teams[currentTeam]; 
  
  if(currentTeam === 0){ 
    document.body.className='blue-bg'; 
    document.getElementById('teamImage').src='./resources/equipo_azul.png'; 
  } else { 
    document.body.className='yellow-bg'; 
    document.getElementById('teamImage').src='./resources/equipo_amarillo.png'; 
  } 
  
  nextQuestion(); 
  
  interval = setInterval(()=>{ 
    timeLeft--; 
    document.getElementById('time').innerText = timeLeft; 
    let percent = (timeLeft/totalTime)*100; 
    document.getElementById('timerFill').style.width = percent+'%'; 
    
    if(timeLeft <= 0){ 
      clearInterval(interval); 
      totalTurnsPlayed++; // CORRECCIÓN: Sumamos un turno completado
      currentTeam = currentTeam === 0 ? 1 : 0; // CORRECCIÓN: Cambiamos al otro equipo de forma limpia (si es 0 pasa a 1, si es 1 pasa a 0)
      nextTurn(); 
    } 
  }, 1000); 
}

function nextQuestion(){ 
  let a = Math.floor(Math.random()*10)+1; 
  let b = Math.floor(Math.random()*10)+1; 
  correctAnswer = a*b; 
  document.getElementById('question').innerText = a + ' × ' + b; 
  document.getElementById('answer').value=''; 
  document.getElementById('answer').focus(); // Extra: Auto-foco en el input para no tener que clicar
  questionStartTime = Date.now(); 
}

function checkAnswer(){ 
  let answerInput = document.getElementById('answer').value;
  if(answerInput === '') return; // Evita enviar respuestas vacías si machacan el botón
  
  let user = parseInt(answerInput); 
  let responseTime = (Date.now()-questionStartTime)/1000; 
  stats[currentTeam].totalResponseTime += responseTime; 
  stats[currentTeam].answers++; 
  
  if(user===correctAnswer){ 
    scores[currentTeam]++; 
    stats[currentTeam].correct++; 
    stats[currentTeam].streak++; 
    if( stats[currentTeam].streak > stats[currentTeam].bestStreak ){ 
      stats[currentTeam].bestStreak = stats[currentTeam].streak; 
    } 
  } else { 
    stats[currentTeam].wrong++; 
    stats[currentTeam].streak = 0; 
  } 
  document.getElementById('score').innerText = scores[currentTeam]; 
  document.getElementById('streak').innerText = stats[currentTeam].streak; 
  nextQuestion(); 
}

function showResults(){ 
  showScreen('result'); 
  document.body.className=''; 
  let winner; 
  if(scores[0] > scores[1]){ 
    winner = teams[0]; 
  } else if(scores[1] > scores[0]){ 
    winner = teams[1]; 
  } else { 
    winner = 'EMPATE 🤝'; 
  } 
  document.getElementById('winnerText').innerHTML = '🏆 GANADOR: ' + winner; 
  let html=''; 
  for(let i=0;i<2;i++){ 
    let total = stats[i].correct + stats[i].wrong; 
    let porcentaje = total===0 ? 0 : ( (stats[i].correct/total)*100 ).toFixed(1); 
    let velocidad = stats[i].answers===0 ? 0 : ( stats[i].totalResponseTime / stats[i].answers ).toFixed(2); 
    html += ` <div style=" margin:20px auto; max-width:600px; background:rgba(255,255,255,.15); padding:20px; border-radius:20px; "> <h2>${teams[i]}</h2> <p>✅ Aciertos: ${stats[i].correct}</p> <p>❌ Errores: ${stats[i].wrong}</p> <p>📊 Porcentaje de éxito: ${porcentaje}%</p> <p>⚡ Velocidad media: ${velocidad} segundos</p> <p>🔥 Mejor racha: ${stats[i].bestStreak}</p> <p>🏅 Puntuación final: ${scores[i]}</p> </div> `; 
  } 
  document.getElementById('statsContainer').innerHTML = html; 
}
  
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('answer').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    checkAnswer();
  }
});
</script>

</body>
</html>
